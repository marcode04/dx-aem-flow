trigger: none
pr: none

resources:
  repositories:
    - repository: dx-hub
      type: git
      name: {{ADO_PROJECT}}/{{ADO_REPO}}
      ref: development
# Claude Agent SDK pipeline — PR Answer via /dx-pr-answer skill.
# Triggered by Lambda webhook on PR comment events.

parameters:
  - name: prUrl
    displayName: "PR URL (full ADO PR URL)"
    type: string
  - name: dryRun
    displayName: "Dry run (draft answers, don't post replies)"
    type: boolean
    default: false
  - name: eventId
    displayName: "Webhook event ID (for tracing)"
    type: string
    default: ""

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 0
    persistCredentials: true
    path: s

  - checkout: dx-hub
    fetchDepth: 1
    path: dx-hub

  - bash: |
      npm install -g @anthropic-ai/claude-code
      npm install --no-save @anthropic-ai/claude-agent-sdk
    displayName: "Install Claude Code + Agent SDK"
    workingDirectory: $(Build.SourcesDirectory)
  - bash: |
      PROMPT="/dx-pr-answer ${{ parameters.prUrl }}"
      if [ "${{ parameters.dryRun }}" = "True" ]; then
        PROMPT="$PROMPT (dry run — draft answers but do NOT post replies or push code)"
      fi

      PLUGIN_DIR="$(Build.SourcesDirectory)/dx-aem-flow/dx/plugins"
      [ -d "$PLUGIN_DIR" ] || PLUGIN_DIR="$(Pipeline.Workspace)/dx-hub/dx-aem-flow/dx/plugins"
      export PLUGIN_BASE_DIR="$PLUGIN_DIR"

      echo "prompt: $PROMPT"
      node .ai/automation/scripts/pipeline-agent.js "$PROMPT"
    displayName: "AI PR Answer"
    env:
      ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
      ADO_MCP_AUTH_TOKEN: $(ADO_PAT)
      TIMEOUT_MINUTES: $(TIMEOUT_MINUTES)
      MAX_TURNS: "30"
      ALLOWED_TOOLS: "Skill,Read,Write,Edit,Glob,Grep,Bash(git *),Agent"
    timeoutInMinutes: 15
