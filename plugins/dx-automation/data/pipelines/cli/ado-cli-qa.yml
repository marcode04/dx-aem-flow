trigger: none
pr: none

resources:
  repositories:
    - repository: dx-hub
      type: git
      name: {{ADO_PROJECT}}/{{ADO_REPO}}
      ref: development
# Claude Agent SDK pipeline — QA Agent via /aem-qa skill.
# Triggered by Lambda webhook on work item tag KAI-QA-AUTOMATION.
# Requires headless Chrome for browser-based QA verification.

parameters:
  - name: workItemId
    displayName: "ADO Work Item ID"
    type: string
  - name: dryRun
    displayName: "Dry run (analyze only, don't create Bug tickets)"
    type: boolean
    default: false
  - name: eventId
    displayName: "Webhook event ID (for tracing)"
    type: string
    default: ""

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 1
    path: s

  - checkout: dx-hub
    fetchDepth: 1
    path: dx-hub

  - bash: |
      sudo apt-get update -qq
      sudo apt-get install -y -qq chromium-browser fonts-liberation libappindicator3-1 libasound2 \
        libatk-bridge2.0-0 libatk1.0-0 libcups2 libdbus-1-3 libgbm1 libgtk-3-0 \
        libnspr4 libnss3 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 xdg-utils
    displayName: "Install headless Chrome + dependencies"

  - bash: |
      npm install -g @anthropic-ai/claude-code
      npm install --no-save @anthropic-ai/claude-agent-sdk
    displayName: "Install Claude Code + Agent SDK"
    workingDirectory: $(Build.SourcesDirectory)
  - bash: |
      PROMPT="/aem-qa ${{ parameters.workItemId }}"
      if [ "${{ parameters.dryRun }}" = "True" ]; then
        PROMPT="$PROMPT (dry run — check rendering and capture screenshots but do NOT create Bug tickets in ADO)"
      fi

      PLUGIN_DIR="$(Build.SourcesDirectory)/dx-aem-flow/dx/plugins"
      [ -d "$PLUGIN_DIR" ] || PLUGIN_DIR="$(Pipeline.Workspace)/dx-hub/dx-aem-flow/dx/plugins"
      export PLUGIN_BASE_DIR="$PLUGIN_DIR"

      echo "prompt: $PROMPT"
      node .ai/automation/scripts/pipeline-agent.js "$PROMPT"
    displayName: "AI QA Agent"
    env:
      ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
      ADO_MCP_AUTH_TOKEN: $(ADO_PAT)
      TIMEOUT_MINUTES: $(TIMEOUT_MINUTES)
      AEM_AUTHOR_URL: $(AEM_AUTHOR_URL)
      AEM_USER: $(AEM_USER)
      AEM_PASS: $(AEM_PASS)
      CHROME_PATH: /usr/bin/chromium-browser
      MAX_TURNS: "40"
      ALLOWED_TOOLS: "Skill,Read,Write,Glob,Grep,Bash,Agent"
    timeoutInMinutes: 30
